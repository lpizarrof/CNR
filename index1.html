<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Página de Prueba</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .contenedor {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            line-height: 1.6;
        }
        .boton {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #3498db;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s;
            border: none;
            cursor: pointer;
        }
        .boton:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>¡Hola Mundo!</h1>
        <p>Esta es una página web de prueba creada con HTML y CSS. Está diseñada para verse centrada, limpia y lista para que realices tus modificaciones.</p>
        <button class="boton" onclick="alert('¡Botón funcionando correctamente!')">Haz clic aquí</button>
    </div>

</body>
</html>
