<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Programa Illapel</title>
    <style>
        /* Estilos generales */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
            background: radial-gradient(circle at center, #354a9b 0%, #202d68 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Estilos de la Cabecera (Header) */
        .header-container {
            text-align: center;
            margin-top: 0;
            padding-top: 0;
        }
        
        .chile-flag-top {
            display: flex;
            width: 140px;
            height: 24px;
            margin: 0 auto;
        }
        
        .flag-blue {
            background-color: #0033a0;
            width: 35%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 16px;
        }
        
        .flag-red {
            background-color: #da291c;
            width: 65%;
        }
        
        .header-text {
            font-weight: 800;
            font-size: 14px;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        /* Estilos del Contenido Central */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .main-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .buttons-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #202d68;
            background-color: #ffffff;
            text-decoration: none;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background-color: #e0e4f5;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        /* Estilos del Pie de Página (Footer) */
        .footer-container {
            display: flex;
            align-items: center;
            width: 90%;
            margin: 0 auto 30px auto;
        }

        .footer-line {
            height: 2px;
            flex-grow: 1;
        }

        .footer-line.left {
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3) 20%, rgba(255, 255, 255, 0.8) 80%, #0033a0, #da291c);
        }

        .footer-line.right {
            background: linear-gradient(to left, transparent, rgba(255, 255, 255, 0.3) 20%, rgba(255, 255, 255, 0.8) 80%, #0033a0, #da291c);
        }

        .footer-text {
            margin: 0 15px;
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 0.5px;
        }
        
        .footer-text span {
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="chile-flag-top">
            <div class="flag-blue">&#9733;</div>
            <div class="flag-red"></div>
        </div>
        <div class="header-text">TRABAJANDO PARA USTED</div>
    </div>

    <div class="main-content">
        <h1 class="main-title">Dashboard de Programa Illapel</h1>
        <div class="buttons-container">
            <a href="db-illapel-cld.html" class="btn">Versión 1</a>
            <a href="db-illapel-gmn.html" class="btn">Versión 2</a>
        </div>
    </div>

    <div class="footer-container">
        <div class="footer-line left"></div>
        <div class="footer-text">GOBIERNO <span>DE</span> CHILE</div>
        <div class="footer-line right"></div>
    </div>

</body>
</html>
